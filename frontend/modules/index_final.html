<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GachaStats - 米哈游抽卡分析工具</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='50' text-anchor='middle' dy='.3em' font-size='70'%3E🎮%3C/text%3E%3C/svg%3E">

    <!-- 样式文件 -->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">

    <!-- Element Plus 样式 -->
    <link rel="stylesheet" href="/static/css/element-plus.css">
</head>
<body>
<div id="app">
    <!-- 加载界面 -->
    <div id="loading" class="loading-mask" v-if="loading">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <p>正在加载GachaStats...</p>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="container fade-in" v-if="!loading">
        <!-- 头部区域 -->
        <header class="header">
            <h1 class="text-gradient">🎮 GachaStats</h1>
            <p class="subtitle">米哈游全游戏抽卡数据分析工具</p>

            <div class="status-badge" :class="connectionStatus">
                <span v-if="connectionStatus === 'success'">✅ 连接正常</span>
                <span v-else-if="connectionStatus === 'error'">❌ 连接失败</span>
                <span v-else>⏳ 连接中...</span>
            </div>

            <div class="quick-actions">
                <el-button type="primary" @click="jumpToBrowserLogin" title="跳转到浏览器登录获取Cookie">
                    🌐 获取登录Cookie
                </el-button>
            </div>
        </header>

        <!-- 主导航 -->
        <nav class="nav-tabs">
            <button
                v-for="tab in availableTabs"
                :key="tab.key"
                class="nav-tab"
                :class="{ active: currentTab === tab.key }"
                @click="currentTab = tab.key"
            >
                {{ tab.label }}
            </button>
        </nav>

        <!-- 内容区域 -->
        <main class="content">
            <!-- 首页信息 -->
            <div v-if="currentTab === 'home'" class="home-section">
                <div class="dashboard-grid">
                    <div class="widget-card">
                        <h3>欢迎回来</h3>
                        <div class="stat-numbers">
                            <div class="stat">
                                <span class="label">账户总数</span>
                                <span class="value">{{ accounts.length }}</span>
                            </div>
                            <div class="stat">
                                <span class="label">连接状态</span>
                                <span class="value" :class="connectionStatus">{{ connectionStatusText }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 账号管理 -->
            <div v-else-if="currentTab === 'accounts'" class="tab-content">
                <accounts-tab :accounts="accounts"></accounts-tab>
            </div>

            <!-- 数据分析 -->
            <div v-else-if="currentTab === 'analysis'" class="tab-content">
                <analysis-tab></analysis-tab>
            </div>

            <!-- 导入数据 -->
            <div v-else-if="currentTab === 'import'" class="tab-content">
                <import-tab></import-tab>
            </div>

            <!-- 系统设置 -->
            <div v-else-if="currentTab === 'settings'" class="tab-content">
                <settings-tab></settings-tab>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>GachaStats v{{ version }} | 全本地数据，隐私安全</p>
        </footer>
    </div>

    <!-- 全局通知 -->
    <el-message
        v-if="globalMessage.visible"
        :type="globalMessage.type"
        :show-close="true"
        @close="globalMessage.visible = false"
    >
        {{ globalMessage.text }}
    </el-message>
</div>
</body>

<!-- 依赖库 -->
<script src="/static/js/vue.global.js"></script>
<script src="/static/js/axios.min.js"></script>
<script src="/static/js/element-plus.js"></script>
<script src="/static/js/echarts.min.js"></script>

<!-- 主应用脚本 -->
<script src="/static/js/app.js"></script>

<!-- 功能模块 -->
<script src="/static/js/modules/accounts.js"></script>
<script src="/static/js/modules/analysis.js"></script>
<script src="/static/js/modules/import.js"></script>
<script src="/static/js/modules/settings.js"></script>

</html>
